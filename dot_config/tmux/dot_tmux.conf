# ─────────────────────────────────────────────
#  Vesper tmux config
#  Palette: #101010 bg · #999 muted · #ffc799 accent · #ffffff bright
# ─────────────────────────────────────────────

# ── General ──────────────────────────────────
set  -g  default-terminal   "tmux-256color"
set  -ag terminal-overrides ",xterm-256color:RGB"
set  -s  extended-keys      on
set  -as terminal-features  '*:extkeys'
set  -g  escape-time        0
set  -g  history-limit      50000
set  -g  mouse              on
set  -g  focus-events       on
set  -g  base-index         1
setw -g  pane-base-index    1
set  -g  renumber-windows   on
set  -g  set-titles         on
set  -g  set-titles-string  "#S · #W"

# ── Prefix ───────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Key bindings ─────────────────────────────
bind r source-file ~/.config/tmux/.tmux.conf \; display "config reloaded"

# Split with current path
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (Prefix + arrow keys)
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Resize (Prefix + Shift + arrow keys, repeatable)
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up resize-pane -U 5
bind -r S-Down resize-pane -D 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Switch between windows with Mac literal Option + number (0-9)
bind -n º select-window -t :=0
bind -n ¡ select-window -t :=1
bind -n ™ select-window -t :=2
bind -n £ select-window -t :=3
bind -n ¢ select-window -t :=4
bind -n ∞ select-window -t :=5
bind -n § select-window -t :=6
bind -n ¶ select-window -t :=7
bind -n • select-window -t :=8
bind -n ª select-window -t :=9

# Standard Meta bindings for windows (if terminal has Option as Meta)
bind -n M-0 select-window -t :=0
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

# Quick access to session/window tree
bind -n C-s choose-tree -Zs

# ── Vesper palette ────────────────────────────
#   bg         #101010   deep black
#   bg_alt     #1a1a1a   slightly lighter surface
#   fg_dim     #555555   very muted
#   fg_muted   #888888   secondary text
#   fg         #c0b9ac   warm off-white
#   accent     #ffc799   vesper amber-orange
#   accent2    #99ffe4   vesper mint (sparingly)
#   red        #ff8080   soft red

# ── Pane borders ─────────────────────────────
set -g pane-border-style          "fg=#2a2a2a"
set -g pane-active-border-style   "fg=#ffc799"

# ── Messages / command prompt ─────────────────
set -g message-style              "fg=#ffc799,bg=#1a1a1a"
set -g message-command-style      "fg=#c0b9ac,bg=#1a1a1a"
set -g display-time               2000

# ── Copy mode ────────────────────────────────
setw -g mode-style                "fg=#101010,bg=#ffc799"

# ── Tree mode (Choose Session/Window) ────────
# Customizes the list when pressing Ctrl+s
# Uses Vesper colors, adds bullet points, hides unnecessary fluff
bind -n C-s choose-tree -Zs -O name -F "#{?pane_format,#[fg=#555555]  - #{pane_current_command} #[fg=#444444](#{pane_current_path}),#{?window_format,#[fg=#888888]  ○ #[fg=#c0b9ac]#{window_name} #[fg=#555555]#{window_layout},#[fg=#ffc799,bold]◆ #[fg=#ffffff]#{session_name} #[fg=#555555](#{session_windows} windows)#{?session_grouped, (group #{session_group}: #{session_group_list}),}#{?session_attached, (attached),}}}"

# ═══════════════════════════════════════════
#  STATUS BAR
# ═══════════════════════════════════════════
set -g status                     on
set -g status-position            bottom
set -g status-interval            5
set -g status-style               "fg=#101010,bg=#ffc799"
set -g status-left-length         80
set -g status-right-length        120

# ── Left: session list ────────────────────────
#   Shows all sessions; current one is highlighted in accent color
#   Format: ❯ main  other  dev
set -g status-left "#(~/.config/tmux/scripts/sessions.sh)"

# ── Right: contextual info ────────────────────
set -g status-right "\
#[fg=#a67c52]│ \
#{?client_prefix,#[bg=#101010]#[fg=#ffc799]#[bold] ⌨ PREFIX #[bg=default]#[fg=#a67c52]#[nobold]│ ,}\
#{?#{==:#{pane_mode},copy-mode},#[bg=#ff8080]#[fg=#101010]#[bold] 󰆒 copy #[bg=default]#[fg=#a67c52]#[nobold]│ ,}\
#[fg=#1a1a1a] #{=/20/…:#{s|$HOME|~|:pane_current_path}} \
#[fg=#a67c52]│ \
#{?window_zoomed_flag,#[bg=#99ffe4]#[fg=#101010]#[bold] ⬡ ZOOM #[bg=default]#[fg=#a67c52]#[nobold]│ ,}\
#[fg=#101010,bold] %H:%M \
#[fg=#1a1a1a,nobold] %d %b\
#[default] "

# ── Window list (center) ──────────────────────
set -g status-justify             left
setw -g window-status-separator   ""

# Inactive window
setw -g window-status-format      \
"#[fg=#101010,bg=#ffc799] #[fg=#555555]#I #[fg=#444444]#W#{?window_flags, #[fg=#555555]#{window_flags},} "

# Active window
setw -g window-status-current-format \
"#[fg=#101010,bg=#ffc799,bold] #[fg=#101010,bold]#I #[fg=#101010,bold]#W#{?window_flags, #[fg=#101010]#{window_flags},} "

# ── Window status indicators ──────────────────
setw -g window-status-activity-style  "fg=#99ffe4"
setw -g window-status-bell-style      "fg=#ff8080"
set  -g monitor-activity              on
set  -g visual-activity               off

# ── Plugins (TPM) ─────────────────────────────
# Install TPM first: git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @battery_color_charge_primary_tier8 '#99ffe4'
set -g @battery_color_charge_primary_tier1 '#ff8080'

run '~/.config/tmux/plugins/tpm/tpm'
